name: build

on:
  push:
  pull_request:

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\VpyAudioCutter.sln

      - name: Build
        run: dotnet build .\VpyAudioCutter.sln -c Release --no-restore

      - name: Parser and command tests
        run: dotnet run --project .\tests\VpyAudioCutter.Tests\VpyAudioCutter.Tests.csproj -c Release --no-build

      - name: WinForms UI smoke test
        run: dotnet run --project .\tests\VpyAudioCutter.UiSmoke\VpyAudioCutter.UiSmoke.csproj -c Release --no-build
